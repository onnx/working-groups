#-----------------------------------------------------------------------------
# General definitions that can be used anywhere using {{ defs.<symbol name> }}
#-----------------------------------------------------------------------------

defs:
  op_name: "Div"
  op_math: "\\textbf{Div}"

  input_a: "$A$"
  input_b: "$B$"
  output_c: "$C$"

  tensor_index: "[tensor index](./../common/defs.md#tensor_index)"
  shape_consistency_title: "Shape consistency"
  type_consistency_title: "Type consistency"

  # Used by the Python helper req_link("REQ_ID").
  # The placeholder {req_id} is replaced by the referenced requirement ID.
  req_link_template: "[<b><span style=\"font-family: 'Courier New', monospace\">{req_id}</span></b>](#{req_id})"


#-----------------------------------------------------------------------------
# Document-level data
#-----------------------------------------------------------------------------
document:
  title: "{{ defs.op_name }} operator specification"
  operator: "{{ defs.op_name }}"
  onnx:
    version: 14
    url: "https://onnx.ai/onnx/operators/onnx__Div.html#div-14"
  general_restrictions_path: "./../common/general_restrictions.md"



#-----------------------------------------------------------------------------
# TOC 
#-----------------------------------------------------------------------------

contents:
  - label: "{{ defs.op_name }} operator for type [real](#real)"
  - label: "{{ defs.op_name }} operator for types [float16, float, double](#float)"
  - label: "{{ defs.op_name }} operator for types [int8, int16, int32, int64, uint8, uint16, uint32, uint64](#int)"


#-----------------------------------------------------------------------------
# Signature data
#-----------------------------------------------------------------------------
#
# Type rule:
# - if an argument defines `type` here, this type is reused for every section;
# - if an argument does not define `type` here, its type is generated from
#   the section datatype, for example `real`, `float`, or `int`.
signature:
  inputs:
    - name: "A"
      role: "Numerator."
    - name: "B"
      role: "Denominator."
  outputs:
    - name: "C"
      role: "Element-wise division of {{ defs.input_a }} by {{ defs.input_b }}."

#-----------------------------------------------------------------------------
# First variant
#-----------------------------------------------------------------------------
variants:
  - datatype: "real"

    restrictions:
      specific: []

    function:
      requirements:
        - req_id: "E_DIV_REAL_FUNC_0010"
          title: "Element-wise real division"
          text: |
            Operator {{ defs.op_name }} divides input tensors {{ defs.input_a }} and {{ defs.input_b }} element-wise and stores the result in output tensor {{ defs.output_c }}.

            If $i$ is a {{ defs.tensor_index }}, each element $C[i]$ is the result of dividing $A[i]$ by $B[i]$.

            The mathematical definition of the operator is given hereafter.

            For any {{ defs.tensor_index }} $i$:

            $$
            C[i] = \frac{A[i]}{B[i]}
            $$

            if $B[i] \neq 0$; otherwise $C[i]$ is not defined.

    examples:
      - title: "Example 1"
        body: |
          $$
          A = \begin{bmatrix} 6.1 & 9.5 & 35.7 \end{bmatrix}
          $$

          $$
          B = \begin{bmatrix} 3 & 3.3 & 5.1 \end{bmatrix}
          $$

          $$
          C = \frac{A}{B}
            = \begin{bmatrix} 6.1/3 & 9.5/3.3 & 35.7/5.1 \end{bmatrix}
          $$

      - title: "Example 2"
        body: |
          $$
          A =
          \begin{bmatrix}
            3.7 & 4.4 \\
            16.2 & 0.5 \\
            25.3 & 24.8
          \end{bmatrix}
          $$

          $$
          B =
          \begin{bmatrix}
            3 & 2.2 \\
            4.1 & 1 \\
            5.2 & 4
          \end{bmatrix}
          $$

          $$
          C = \frac{A}{B}
            =
          \begin{bmatrix}
            3.7/3 & 2 \\
            16.2/4.1 & 0.5 \\
            25.3/5.2 & 6.2
          \end{bmatrix}
          $$

    error_conditions: []

    attributes: []

    constraints:
      A:
        - req_id: "E_DIV_REAL_CONSTR_A_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            Tensors {{ defs.input_a }}, {{ defs.input_b }}, and {{ defs.output_c }} shall have the same shape.

      B:
        - req_id: "E_DIV_REAL_CONSTR_B_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_REAL_CONSTR_A_0010") }} on tensor {{ defs.input_a }}.
        - req_id: "E_DIV_REAL_CONSTR_B_0020"
          title: "Avoid undefined behaviour for operator {{ defs.op_name }}"
          statement: |
            $\forall i,\ B[i] \neq 0$

      C:
        - req_id: "E_DIV_REAL_CONSTR_C_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_REAL_CONSTR_A_0010") }} on tensor {{ defs.input_a }}.

  - datatype: "float"
    type_note: "where float is in {float16, float, double}"

    restrictions:
      specific: []

    function:
      requirements:
        - req_id: "E_DIV_FLOAT_FUNC_0010"
          title: "Element-wise floating-point division"
          text: |
            Operator {{ defs.op_name }} divides input tensors {{ defs.input_a }} and {{ defs.input_b }} element-wise according to IEEE 754 floating-point semantics and stores the result in output tensor {{ defs.output_c }}.

            If $i$ is a {{ defs.tensor_index }}, each element $C[i]$ is the result of dividing $A[i]$ by $B[i]$.

            The mathematical definition of the operator is given hereafter.

            For any {{ defs.tensor_index }} $i$:

            $$
            C[i] =
            \begin{cases}
            A[i]/B[i] & \text{if } A[i] \text{ and } B[i] \text{ are different from } 0 \\
            \pm\mathrm{inf} & \text{if } A[i] \neq 0 \text{ and } B[i] = 0 \\
            \mathrm{NaN} & \text{if } A[i] = 0 \text{ and } B[i] = 0
            \end{cases}
            $$

            In the second case, the sign of $\pm\mathrm{inf}$ is determined from the signs of $A[i]$ and the zero value ($+0$ or $-0$) according to IEEE 754 rules.

    examples:
      - title: "Example 1"
        body: |
          $$
          A =
          \begin{bmatrix}
          3.0 & 4.5 \\
          16.0 & 1.0 \\
          25.5 & 24.25
          \end{bmatrix}
          \quad
          B =
          \begin{bmatrix}
          3.0 & 2.0 \\
          4.0 & 0.0 \\
          5.0 & 4.0
          \end{bmatrix}
          $$

          $$
          C \approx
          \begin{bmatrix}
          1.0 & 2.25 \\
          4.0 & +\mathrm{inf} \\
          5.1 & 6.0625
          \end{bmatrix}
          $$

      - title: "Example 2"
        body: |
          $$
          A =
          \begin{bmatrix}
          3.25 & 4.5 \\
          16.0 & 0.0 \\
          25.5 & 24.25
          \end{bmatrix}
          \quad
          B =
          \begin{bmatrix}
          3.0 & 2.0 \\
          4.0 & 0.0 \\
          5.0 & 4.0
          \end{bmatrix}
          $$

          $$
          C \approx
          \begin{bmatrix}
          1.0833 & 2.25 \\
          4.0 & \mathrm{NaN} \\
          5.1 & 6.0625
          \end{bmatrix}
          $$

    error_conditions:
      - |
        A value in the output tensor is NaN if the numerator and denominator are both 0 ($+0.0$ or $-0.0$ according to IEEE 754).

    attributes: []

    constraints:
      A:
        - req_id: "E_DIV_FLOAT_CONSTR_A_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            Tensors {{ defs.input_a }}, {{ defs.input_b }}, and {{ defs.output_c }} must have the same shape.
        - req_id: "E_DIV_FLOAT_CONSTR_A_0020"
          title: "{{ defs.type_consistency_title }}"
          statement: |
            Tensors {{ defs.input_a }}, {{ defs.input_b }}, and {{ defs.output_c }} must have the same type.

      B:
        - req_id: "E_DIV_FLOAT_CONSTR_B_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_FLOAT_CONSTR_A_0010") }} on tensor {{ defs.input_a }}.
        - req_id: "E_DIV_FLOAT_CONSTR_B_0020"
          title: "{{ defs.type_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_FLOAT_CONSTR_A_0020") }} on tensor {{ defs.input_a }}.

      C:
        - req_id: "E_DIV_FLOAT_CONSTR_C_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_FLOAT_CONSTR_A_0010") }} on tensor {{ defs.input_a }}.
        - req_id: "E_DIV_FLOAT_CONSTR_C_0020"
          title: "{{ defs.type_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_FLOAT_CONSTR_A_0020") }} on tensor {{ defs.input_a }}.

  - datatype: "int"
    type_note: "where int is in {int8, int16, int32, int64, uint8, uint16, uint32, uint64}."

    restrictions:
      specific: []

    function:
      requirements:
        - req_id: "E_DIV_INT_FUNC_0010"
          title: "Element-wise integer division"
          text: |
            Operator {{ defs.op_name }} divides input tensors {{ defs.input_a }} and {{ defs.input_b }} element-wise and stores the result in output tensor {{ defs.output_c }}.

            For any {{ defs.tensor_index }} $i$, the result of the division is the algebraic quotient of $A[i]$ by $B[i]$ with any fractional part discarded.

            $$
            C[i] = \operatorname{trunc}\left(\frac{A[i]}{B[i]}\right)
            $$

            where $B[i] \neq 0$.

    examples:
      - title: "Example 1"
        body: |
          $$
          A = \begin{bmatrix} 6 & 5 & -35 \end{bmatrix}
          \quad
          B = \begin{bmatrix} 3 & 3 & 3 \end{bmatrix}
          $$

          $$
          C = \begin{bmatrix} 2 & 1 & -11 \end{bmatrix}
          $$

      - title: "Example 2"
        body: |
          $$
          A =
          \begin{bmatrix}
          10 & 10 \\
          21 & 1 \\
          30 & 9
          \end{bmatrix}
          \quad
          B =
          \begin{bmatrix}
          3 & 2 \\
          4 & 1 \\
          5 & 4
          \end{bmatrix}
          $$

          $$
          C =
          \begin{bmatrix}
          3 & 5 \\
          5 & 1 \\
          6 & 2
          \end{bmatrix}
          $$

    error_conditions:
      - "The behaviour in case of a null denominator is implementation dependent."

    attributes: []

    constraints:
      A:
        - req_id: "E_DIV_INT_CONSTR_A_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            Tensors {{ defs.input_a }}, {{ defs.input_b }}, and {{ defs.output_c }} must have the same shape.
        - req_id: "E_DIV_INT_CONSTR_A_0020"
          title: "{{ defs.type_consistency_title }}"
          statement: |
            Tensors {{ defs.input_a }}, {{ defs.input_b }}, and {{ defs.output_c }} must have the same type.

      B:
        - req_id: "E_DIV_INT_CONSTR_B_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_INT_CONSTR_A_0010") }} on tensor {{ defs.input_a }}.
        - req_id: "E_DIV_INT_CONSTR_B_0020"
          title: "{{ defs.type_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_INT_CONSTR_A_0020") }} on tensor {{ defs.input_a }}.
        - req_id: "E_DIV_INT_CONSTR_B_0030"
          title: "Definition domain"
          statement: |
            $$
            \forall i,\ B[i] \neq 0
            $$

      C:
        - req_id: "E_DIV_INT_CONSTR_C_0010"
          title: "{{ defs.shape_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_INT_CONSTR_A_0010") }} on tensor {{ defs.input_a }}.
        - req_id: "E_DIV_INT_CONSTR_C_0020"
          title: "{{ defs.type_consistency_title }}"
          statement: |
            See constraint {{ req_link("E_DIV_INT_CONSTR_A_0020") }} on tensor {{ defs.input_a }}.
